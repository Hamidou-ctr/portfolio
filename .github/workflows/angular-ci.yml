name: Angular CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20.19.6
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
      - name: Run tests
        run: npm test