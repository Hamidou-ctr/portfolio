version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"

    groups:
      angular:
        patterns:
          - "@angular*"

      dev-dependencies:
        dependency-type: "development"

    ignore:
      - dependency-name: "*" # Alle Abhängigkeiten ignorieren
        update-types:
          [
            "version-update:semver-major",
            "version-update:semver-minor",
            "version-update:semver-patch",
          ]

        cooldown:
          semver-major-days: 30
          semver-minor-days: 7
          semver-patch-days: 3
